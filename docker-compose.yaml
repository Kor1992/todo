services:
  todoapp-postgres:
    image: postgres:16.13-bookworm
    container_name: todoapp-env-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-todoapp}
    volumes:
      - pgdata:/var/lib/postgresql/data          # ← меняем на volume
    restart: always

  todoapp-postgres-migrate:
    image: migrate/migrate:v4.19.1
    container_name: todoapp-postgres-migrate
    volumes:
      - ./migrations:/migrations                 # ← убираем PROJECT_ROOT
    command: [
      "-path", "/migrations",
      "-database", "postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@todoapp-postgres:5432/${POSTGRES_DB}?sslmode=disable",
      "up"
    ]
    depends_on:
      - todoapp-postgres

  port-forwarder:
    image: alpine/socat:1.8.0.3
    container_name: todoapp-postgres-port-forwarder
    command: tcp-listen:5432,fork,reuseaddr tcp-connect:todoapp-postgres:5432
    ports:
      - "127.0.0.1:5432:5432"
    depends_on:
      - todoapp-postgres

volumes:
  pgdata: