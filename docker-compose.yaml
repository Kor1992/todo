services:
  todoapp-postgres:
    image: postgres:16.13-bookworm
    container_name: todoapp-env-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-todoapp}
    volumes:
      - ${PROJECT_ROOT:-.}/out/pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    restart: always


  todoapp-postgres-migrate:
    image: migrate/migrate:v4.19.1
    volumes: 
      - ${PROJECT_ROOT}/migrations:/migrations